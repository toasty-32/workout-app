<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Workout Tracker</title>
<link rel="manifest" href="manifest.json">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}

/* ── DARK THEME (default) ── */
:root,[data-theme="dark"]{
  --bg:#0D1117;--bg2:#161B24;--bg3:#1E2535;--bg4:#252E40;
  --border:#2A3347;--border2:#374260;
  --text:#E8EAF0;--text2:#8892A4;--text3:#50596A;
  --shadow:0 2px 8px rgba(0,0,0,.4);
  --blue:#3B8BEB;--blueDim:#1A3A5C;--blueDimBorder:#2A4A7C;
  --amber:#F0A020;--amberDim:#2A1E04;--amberDimBorder:#5A3A10;
  --green:#2ECC71;
  --push:#E05030;--pushBg:#2A1208;
  --pull:#1A9E75;--pullBg:#071F17;
  --expl:#E0A020;--explBg:#2A1E04;
  --func:#3B8BEB;--funcBg:#0A1A2E;
  --theme-icon:"🌙";
}

/* ── LIGHT THEME ── */
[data-theme="light"]{
  --bg:#F0F3F8;--bg2:#FFFFFF;--bg3:#E8ECF4;--bg4:#DDE3EE;
  --border:#C8D0DF;--border2:#A8B4C8;
  --text:#1A2233;--text2:#546078;--text3:#8A97AA;
  --shadow:0 2px 8px rgba(0,0,0,.10);
  --blue:#1A6DD9;--blueDim:#DDEAFF;--blueDimBorder:#A8C4EE;
  --amber:#B87000;--amberDim:#FFF3D6;--amberDimBorder:#E8C060;
  --green:#1A9E50;
  --push:#C0392B;--pushBg:#FDECEA;
  --pull:#0E7A5A;--pullBg:#E0F5EE;
  --expl:#B87000;--explBg:#FFF3D6;
  --func:#1A6DD9;--funcBg:#DDEAFF;
  --theme-icon:"☀️";
}

html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;overscroll-behavior:none;font-size:16px;transition:background .2s,color .2s}
:root{
  --r:12px;--r-sm:8px;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bot:env(safe-area-inset-bottom,0px);
}
#app{display:flex;flex-direction:column;height:100%;max-width:480px;margin:0 auto}

/* ── HEADER ── */
#hdr{padding:calc(var(--safe-top) + 10px) 14px 10px;background:var(--bg);border-bottom:1px solid var(--border);flex-shrink:0;z-index:50;transition:background .2s,border-color .2s}
.hdr-row{display:flex;align-items:center;gap:8px}
.hdr-back{background:var(--bg3);border:none;color:var(--text);width:34px;height:34px;border-radius:var(--r-sm);font-size:18px;cursor:pointer;display:none;align-items:center;justify-content:center;flex-shrink:0}
.hdr-back.show{display:flex}
#hdr-title{font-size:16px;font-weight:600;flex:1}
#hdr-sub{font-size:11px;color:var(--text2);margin-top:1px}
.hdr-btns{display:flex;gap:6px;align-items:center;flex-shrink:0}
.hdr-btn{background:var(--bg3);border:1px solid var(--border);color:var(--text2);font-size:12px;padding:5px 10px;border-radius:var(--r-sm);cursor:pointer;white-space:nowrap}
.hdr-btn.hidden{display:none}
.hdr-btn.active{background:var(--blueDim);border-color:var(--blue);color:var(--blue)}
#theme-btn{font-size:16px;padding:5px 8px;line-height:1}

/* ── SCREENS ── */
.screen{flex:1;overflow-y:auto;display:none;-webkit-overflow-scrolling:touch;padding-bottom:calc(60px + var(--safe-bot) + 20px)}
.screen.active{display:block}

/* ── HOME ── */
.quick-strip{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;padding:14px 14px 0}
.qs-card{text-align:center;padding:10px 4px;border-radius:var(--r-sm);border:1px solid var(--border);cursor:pointer;transition:opacity .15s}
.qs-card.upper{background:var(--blueDim);border-color:var(--blueDimBorder)}
.qs-card.lower{background:var(--amberDim);border-color:var(--amberDimBorder)}
.qs-card.done{opacity:.4}
.qs-type{font-size:10px;font-weight:700;display:block;text-transform:uppercase;letter-spacing:.05em}
.qs-card.upper .qs-type{color:var(--blue)}
.qs-card.lower .qs-type{color:var(--amber)}
.qs-name{font-size:12px;font-weight:500;display:block;margin-top:2px}
.sec-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--text3);padding:16px 14px 8px}
.day-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);margin:0 14px 8px;padding:13px 14px;cursor:pointer;display:flex;align-items:center;gap:12px;box-shadow:var(--shadow);transition:background .15s}
.day-card:active{background:var(--bg3)}
.dc-num{width:36px;height:36px;border-radius:var(--r-sm);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0}
.day-card.upper .dc-num{background:var(--blueDim);color:var(--blue)}
.day-card.lower .dc-num{background:var(--amberDim);color:var(--amber)}
.dc-info{flex:1;min-width:0}
.dc-name{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dc-sub{font-size:11px;color:var(--text2);margin-top:2px}
.dc-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
.dc-pct{font-size:12px}
.dc-pct.done{color:var(--green)}
.dc-pct.partial{color:var(--amber)}
.prog-bar{width:50px;height:3px;background:var(--border);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;border-radius:2px;transition:width .3s}
.prog-fill.upper{background:var(--blue)}
.prog-fill.lower{background:var(--amber)}
.prog-fill.complete{background:var(--green)}
.dc-chev{color:var(--text3);font-size:16px}

/* ── DAY DETAIL ── */
#day-detail{padding-bottom:calc(60px + var(--safe-bot) + 20px)}
.dd-top{padding:12px 14px 0}
.dd-prog-bar{height:3px;background:var(--border);border-radius:2px;overflow:hidden;margin-bottom:4px}
.dd-prog-fill{height:100%;background:var(--green);border-radius:2px;transition:width .3s}
.dd-prog-label{font-size:11px;color:var(--text2);text-align:right;margin-bottom:10px}
.warmup-bar{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r-sm);padding:9px 12px;font-size:12px;color:var(--text2);display:flex;align-items:center;gap:6px;margin-bottom:12px}

/* Superset block */
.ss-block{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);margin:0 14px 10px;overflow:hidden;box-shadow:var(--shadow)}
.ss-hdr{display:flex;align-items:center;padding:10px 12px;gap:8px;border-bottom:1px solid var(--border)}
.ss-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text2);flex:1}
.ss-reps{font-size:11px;color:var(--text3);background:var(--bg3);padding:3px 8px;border-radius:20px}
.ss-done-count{font-size:11px;color:var(--green)}
.reorder-btns{display:none;gap:4px}
.reorder-btns.show{display:flex}
.ro-btn{background:var(--bg3);border:1px solid var(--border);color:var(--text2);width:28px;height:28px;border-radius:6px;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.ro-btn:disabled{opacity:.25;cursor:default}

/* Exercise rows */
.ex-item{border-bottom:1px solid var(--border)}
.ex-item:last-child{border-bottom:none}
.ex-row-hdr{display:flex;align-items:center;padding:10px 12px;gap:8px;cursor:pointer}
.ex-row-hdr:active{background:var(--bg3)}
.ex-tag{font-size:9px;font-weight:700;letter-spacing:.04em;padding:2px 6px;border-radius:4px;flex-shrink:0;text-transform:uppercase}
.ex-tag.push{background:var(--pushBg);color:var(--push)}
.ex-tag.pull{background:var(--pullBg);color:var(--pull)}
.ex-tag.explosive{background:var(--explBg);color:var(--expl)}
.ex-tag.functional{background:var(--funcBg);color:var(--func)}
.ex-name{flex:1;font-size:13px;font-weight:500;line-height:1.3}
.ex-summary{font-size:11px;color:var(--text2);flex-shrink:0}
.ex-chevron{color:var(--text3);font-size:13px;transition:transform .2s;flex-shrink:0}
.ex-chevron.open{transform:rotate(90deg)}

/* Set rows */
.ex-sets{display:none;padding:0 12px 10px;background:var(--bg3)}
.ex-sets.open{display:block}
.set-row{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.set-num{font-size:11px;color:var(--text3);width:36px;flex-shrink:0}
.set-input{background:var(--bg2);border:1px solid var(--border);color:var(--text);border-radius:6px;text-align:center;font-size:13px;font-family:inherit;transition:border-color .15s}
.set-input:focus{outline:none;border-color:var(--blue)}
.set-weight{width:62px;height:32px}
.set-unit{font-size:10px;color:var(--text3);flex-shrink:0}
.set-x{font-size:11px;color:var(--text3);flex-shrink:0}
.set-reps{width:44px;height:32px}
.set-dot{width:28px;height:28px;border-radius:50%;border:1.5px solid var(--border);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.set-dot.done{background:var(--green);border-color:var(--green);color:#fff;font-size:12px}
.set-dot.done::after{content:"✓"}
.set-actions{display:flex;gap:6px;margin-top:6px;justify-content:space-between;align-items:center}
.set-adj{background:var(--bg2);border:1px solid var(--border);color:var(--text2);font-size:12px;padding:5px 14px;border-radius:20px;cursor:pointer}
.set-adj:active{background:var(--bg3)}
.set-rest{background:var(--blue);border:none;color:#fff;font-size:12px;padding:6px 12px;border-radius:20px;cursor:pointer;display:flex;align-items:center;gap:4px;font-weight:500}
.set-rest:active{opacity:.85}

/* ── TIMER ── */
#timer-screen{display:none;flex-direction:column;justify-content:center;align-items:center;padding:0 24px}
#timer-screen.active{display:flex}
#t-label{font-size:12px;color:var(--text2);margin-bottom:28px;letter-spacing:.08em;text-transform:uppercase}
#timer-ring{width:200px;height:200px;position:relative;margin:0 auto 28px}
#t-svg{transform:rotate(-90deg)}
#t-track{fill:none;stroke:var(--border);stroke-width:10}
#t-arc{fill:none;stroke:var(--blue);stroke-width:10;stroke-linecap:round;stroke-dasharray:565;stroke-dashoffset:0;transition:stroke-dashoffset .9s linear}
#t-arc.warn{stroke:var(--amber)}
#t-arc.urgent{stroke:var(--push)}
#t-num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:48px;font-weight:300;letter-spacing:-2px;color:var(--text)}
#t-skip{background:var(--bg3);border:1px solid var(--border);color:var(--text);font-size:15px;padding:13px 36px;border-radius:var(--r);cursor:pointer;font-weight:500}
#t-skip:active{background:var(--bg4)}

/* ── CALENDAR ── */
#calendar-screen{padding:14px}
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.cal-nav-btn{background:var(--bg3);border:1px solid var(--border);color:var(--text);width:34px;height:34px;border-radius:var(--r-sm);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.cal-month{font-size:16px;font-weight:600}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:16px}
.cal-dow{text-align:center;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);padding:4px 0}
.cal-day{text-align:center;padding:5px 2px;border-radius:6px;cursor:pointer;min-height:34px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;border:1px solid transparent}
.cal-day.empty{pointer-events:none}
.cal-day.today{border-color:var(--blue)}
.cal-dot{width:5px;height:5px;border-radius:50%}
.cal-day.upper .cal-dot{background:var(--blue)}
.cal-day.lower .cal-dot{background:var(--amber)}
.cal-day.has-workout .cal-dn{font-weight:700}
.cal-day.selected{background:var(--bg3);border-color:var(--border2)}
.cal-log-title{font-size:13px;font-weight:600;margin-bottom:10px;color:var(--text2)}
.cal-entry{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;margin-bottom:8px;box-shadow:var(--shadow)}
.cal-entry-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.cal-entry-day{font-size:14px;font-weight:600}
.cal-entry-ss{margin-bottom:6px}
.cal-entry-ss-name{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px}
.cal-entry-ex{display:flex;align-items:center;gap:6px;font-size:12px;margin-bottom:3px}
.cal-sets-inline{color:var(--text2);font-size:11px;flex-shrink:0}
.cal-empty{text-align:center;padding:32px 16px;color:var(--text3);font-size:13px}

/* ── PROGRESS ── */
#progress-screen{padding:14px}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.stat-cell{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px;text-align:center;box-shadow:var(--shadow)}
.stat-val{font-size:28px;font-weight:300}
.stat-lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-top:3px}
.prog-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:10px;box-shadow:var(--shadow)}
.prog-card-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);margin-bottom:12px}
.prog-row{margin-bottom:10px}
.prog-row:last-child{margin-bottom:0}
.prog-row-top{display:flex;justify-content:space-between;margin-bottom:4px}
.prog-row-name{font-size:13px;font-weight:500}
.prog-row-val{font-size:12px;color:var(--text2)}
.prog-bar2{height:5px;background:var(--border);border-radius:3px;overflow:hidden}
.prog-fill2{height:100%;border-radius:3px;transition:width .4s}

/* ── BOTTOM NAV ── */
#bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;padding:8px 16px calc(var(--safe-bot) + 8px);background:var(--bg2);border-top:1px solid var(--border);display:flex;justify-content:space-around;z-index:100;transition:background .2s}
.bnav-btn{background:none;border:none;color:var(--text3);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;font-size:10px;padding:4px 12px;border-radius:var(--r-sm)}
.bnav-btn.active{color:var(--blue)}
.bnav-icon{font-size:20px}
</style>
</head>
<body>
<div id="app">

  <!-- HEADER -->
  <div id="hdr">
    <div class="hdr-row">
      <button class="hdr-back" id="back-btn">←</button>
      <div style="flex:1">
        <div id="hdr-title">Workout Tracker</div>
        <div id="hdr-sub"></div>
      </div>
      <div class="hdr-btns">
        <button class="hdr-btn hidden" id="reorder-btn">Reorder</button>
        <button class="hdr-btn" id="theme-btn">☀️</button>
      </div>
    </div>
  </div>

  <!-- HOME -->
  <div id="home-screen" class="screen active">
    <div class="quick-strip" id="quick-strip"></div>
    <div class="sec-label">Select Workout</div>
    <div id="day-list"></div>
  </div>

  <!-- DAY DETAIL -->
  <div id="day-screen" class="screen">
    <div id="day-detail"></div>
  </div>

  <!-- TIMER -->
  <div id="timer-screen" class="screen">
    <div id="t-label">Rest — 2:00</div>
    <div id="timer-ring">
      <svg id="t-svg" width="200" height="200" viewBox="0 0 200 200">
        <circle id="t-track" cx="100" cy="100" r="90"/>
        <circle id="t-arc"   cx="100" cy="100" r="90"/>
      </svg>
      <div id="t-num">2:00</div>
    </div>
    <button id="t-skip">Done resting →</button>
  </div>

  <!-- CALENDAR -->
  <div id="calendar-screen" class="screen">
    <div class="cal-nav">
      <button class="cal-nav-btn" id="cal-prev">‹</button>
      <span class="cal-month" id="cal-month-label"></span>
      <button class="cal-nav-btn" id="cal-next">›</button>
    </div>
    <div class="cal-grid" id="cal-grid"></div>
    <div class="cal-log-title" id="cal-log-title"></div>
    <div id="cal-log"></div>
  </div>

  <!-- PROGRESS -->
  <div id="progress-screen" class="screen"></div>

  <!-- BOTTOM NAV -->
  <nav id="bnav">
    <button class="bnav-btn active" id="nav-home"     onclick="goHome()">    <span class="bnav-icon">🏋️</span>Plan</button>
    <button class="bnav-btn"        id="nav-calendar" onclick="goCalendar()"><span class="bnav-icon">📅</span>Calendar</button>
    <button class="bnav-btn"        id="nav-progress" onclick="goProgress()"><span class="bnav-icon">📊</span>Progress</button>
  </nav>
</div>

<script>
/* ═══════════════ PLAN DATA (no day-of-week) ═══════════════ */
const PLAN = [

   title:"Upper A — Horizontal Push/Pull",sub:"Chest · Back · Arms",

    {lbl:"SS 3",reps:"3 × 12",     defSets:3,ex:[{t:"push",n:"Leg press"},{t:"pull",n:"Hip adductor machine"}]},

  {id:"d5",day:5,type:"upper",short:"Upper C",

    {lbl:"SS 2",reps:"3 × 6+10",   defSets:3,ex:[{t:"pull",n:"Weighted pull-up × 6"},{t:"push",n:"DB shoulder press × 10"}]},
    {lbl:"SS 3",reps:"3 × 10+12",  defSets:3,ex:[{t:"pull",n:"Cable seated row"},{t:"functional",n:"Wood chopper"}]},
    {lbl:"SS 4",reps:"3 × 12+10",  defSets:3,ex:[{t:"push",n:"Dips × 12"},{t:"functional",n:"Crawl shoulder tap × 10"}]},
    {lbl:"SS 5",reps:"2 rounds",   defSets:2,ex:[{t:"explosive",n:"Kettlebell swing × 12"},{t:"functional",n:"Farmer carry 30–40m"}]},
  ]},
  {id:"d6",day:6,type:"lower",short:"Lower C",
   title:"Lower C — Power Lower + Core",sub:"Full Lower · Power · Core",
   ss:[
    {lbl:"SS 1",reps:"4 × 5+5",    defSets:4,ex:[{t:"push",n:"Barbell squat — max load"},{t:"explosive",n:"Jump squat × 5"}]},
    {lbl:"SS 2",reps:"3 × 8+5",    defSets:3,ex:[{t:"pull",n:"Romanian deadlift × 8"},{t:"explosive",n:"Standing broad jump × 5"}]},
    {lbl:"SS 3",reps:"3 × 10+12",  defSets:3,ex:[{t:"push",n:"DB reverse lunge × 10 ea"},{t:"pull",n:"Barbell hip thrust × 12"}]},
    {lbl:"SS 4",reps:"3 × 12+10",  defSets:3,ex:[{t:"pull",n:"Hip abductor machine × 12"},{t:"functional",n:"Airplane × 10 ea side"}]},
    {lbl:"SS 5",reps:"3 × 15+20",  defSets:3,ex:[{t:"functional",n:"DB raise crunch × 15"},{t:"functional",n:"Plate Russian twist × 20"}]},
  ]},
];

/* ═══════════════ STATE ═══════════════ */
const SK = "wt_v3";
let S = (() => { try{ return JSON.parse(localStorage.getItem(SK)||"null")||{config:{},sessions:{}}; }catch(e){ return {config:{},sessions:{}}; } })();
const THEME_KEY = "wt_theme";

function save(){ localStorage.setItem(SK, JSON.stringify(S)); }
function today(){ return new Date().toISOString().slice(0,10); }

function getDayConfig(dayId){
  if(!S.config[dayId]){ S.config[dayId]={ssOrder:PLAN.find(d=>d.id===dayId).ss.map((_,i)=>i)}; save(); }
  return S.config[dayId];
}
function getSession(dayId, date){
  const key=`${date}_${dayId}`;
  if(!S.sessions[key]){ S.sessions[key]={dayId,date,sets:{},setCount:{},opened:Date.now()}; save(); }
  return S.sessions[key];
}
function getSetCount(sess,ssIdx,exIdx){
  const k=`${ssIdx}-${exIdx}`;
  if(sess.setCount[k]==null){ sess.setCount[k]=PLAN.find(d=>d.id===sess.dayId).ss[ssIdx].defSets; }
  return sess.setCount[k];
}
function getSetData(sess,ssIdx,exIdx,setIdx){
  const k=`${ssIdx}-${exIdx}-${setIdx}`;
  if(!sess.sets[k]) sess.sets[k]={weight:"",reps:"",done:false};
  return sess.sets[k];
}
function countDone(sess,day){
  let done=0,total=0;
  day.ss.forEach((_,si)=>_.ex.forEach((__,ei)=>{
    const n=getSetCount(sess,si,ei); total+=n;
    for(let i=0;i<n;i++) if(getSetData(sess,si,ei,i).done) done++;
  }));
  return {done,total};
}

/* ═══════════════ THEME ═══════════════ */
function applyTheme(t){
  document.documentElement.setAttribute("data-theme",t);
  document.getElementById("theme-btn").textContent = t==="dark" ? "☀️" : "🌙";
  localStorage.setItem(THEME_KEY,t);
}
function toggleTheme(){
  const cur = document.documentElement.getAttribute("data-theme");
  applyTheme(cur==="dark"?"light":"dark");
}
// Load saved theme on startup
applyTheme(localStorage.getItem(THEME_KEY)||"dark");

/* ═══════════════ NAVIGATION ═══════════════ */
let currentScreen="home", currentDayId=null, reorderMode=false;
let calViewDate=new Date(), calSelectedDate=null;
let timerInterval=null, timerLeft=120, timerTotal=120;

function setScreen(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id+"-screen").classList.add("active");
  currentScreen=id;
  document.querySelectorAll(".bnav-btn").forEach(b=>b.classList.remove("active"));
}

function goHome(){
  setScreen("home");
  document.getElementById("nav-home").classList.add("active");
  document.getElementById("back-btn").classList.remove("show");
  document.getElementById("reorder-btn").classList.add("hidden");
  document.getElementById("reorder-btn").classList.remove("active");
  document.getElementById("hdr-title").textContent="Workout Tracker";
  document.getElementById("hdr-sub").textContent="";
  reorderMode=false;
  renderHome();
}

function openDay(dayId){
  currentDayId=dayId; reorderMode=false;
  const day=PLAN.find(d=>d.id===dayId);
  setScreen("day");
  document.getElementById("back-btn").classList.add("show");
  document.getElementById("reorder-btn").classList.remove("hidden","active");
  document.getElementById("reorder-btn").textContent="Reorder";
  document.getElementById("hdr-title").textContent=day.short;
  document.getElementById("hdr-sub").textContent=day.sub;
  renderDay();
}

function goCalendar(){
  setScreen("calendar");
  document.getElementById("nav-calendar").classList.add("active");
  document.getElementById("back-btn").classList.remove("show");
  document.getElementById("reorder-btn").classList.add("hidden");
  document.getElementById("hdr-title").textContent="Calendar";
  document.getElementById("hdr-sub").textContent="";
  calViewDate=new Date(); calSelectedDate=today();
  renderCalendar();
}

function goProgress(){
  setScreen("progress");
  document.getElementById("nav-progress").classList.add("active");
  document.getElementById("back-btn").classList.remove("show");
  document.getElementById("reorder-btn").classList.add("hidden");
  document.getElementById("hdr-title").textContent="Progress";
  document.getElementById("hdr-sub").textContent="";
  renderProgress();
}

function goTimer(){
  setScreen("timer");
  document.getElementById("back-btn").classList.add("show");
  document.getElementById("reorder-btn").classList.add("hidden");
  document.getElementById("hdr-title").textContent="Rest Timer";
  document.getElementById("hdr-sub").textContent="";
  timerLeft=120; timerTotal=120;
  document.getElementById("t-skip").textContent="Done resting →";
  clearInterval(timerInterval);
  updateTimerUI();
  timerInterval=setInterval(()=>{
    timerLeft--;
    updateTimerUI();
    if(timerLeft<=0){
      clearInterval(timerInterval);
      if(navigator.vibrate) navigator.vibrate([200,100,200,100,200]);
      document.getElementById("t-skip").textContent="Let's go! →";
    }
  },1000);
}

function updateTimerUI(){
  const m=Math.floor(timerLeft/60),s=timerLeft%60;
  const lbl=`${m}:${s.toString().padStart(2,"0")}`;
  document.getElementById("t-num").textContent=lbl;
  document.getElementById("t-label").textContent=`Rest — ${lbl}`;
  document.getElementById("t-arc").style.strokeDashoffset=565*(1-timerLeft/timerTotal);
  document.getElementById("t-arc").className=timerLeft<=10?"urgent":timerLeft<=30?"warn":"";
}

/* ═══════════════ HOME ═══════════════ */
function renderHome(){
  const t=today();
  // Quick strip — 2×3 grid, no day labels
  document.getElementById("quick-strip").innerHTML=PLAN.map(d=>{
    const sess=getSession(d.id,t);
    const {done,total}=countDone(sess,d);
    const isDone=done>0&&done>=total;
    return `<div class="qs-card ${d.type}${isDone?" done":""}" onclick="openDay('${d.id}')">
      <span class="qs-type">${d.type==="upper"?"Upper":"Lower"}</span>
      <span class="qs-name">${d.short.split(" ")[1]}</span>
    </div>`;
  }).join("");

  document.getElementById("day-list").innerHTML=PLAN.map(d=>{
    const sess=getSession(d.id,t);
    const {done,total}=countDone(sess,d);
    const pct=total>0?Math.round(done/total*100):0;
    const isDone=pct===100, isPartial=pct>0&&!isDone;
    return `<div class="day-card ${d.type}" onclick="openDay('${d.id}')">
      <div class="dc-num">${d.day}</div>
      <div class="dc-info">
        <div class="dc-name">${d.title}</div>
        <div class="dc-sub">${d.sub}</div>
      </div>
      <div class="dc-right">
        <div class="dc-pct ${isDone?"done":isPartial?"partial":""}">${isDone?"✓ Done":isPartial?pct+"%":""}</div>
        <div class="prog-bar"><div class="prog-fill ${isDone?"complete":d.type}" style="width:${pct}%"></div></div>
      </div>
      <span class="dc-chev">›</span>
    </div>`;
  }).join("");
}

/* ═══════════════ DAY DETAIL ═══════════════ */
function renderDay(){
  const day=PLAN.find(d=>d.id===currentDayId);
  const cfg=getDayConfig(currentDayId);
  const sess=getSession(currentDayId,today());
  const {done,total}=countDone(sess,day);
  const pct=total>0?Math.round(done/total*100):0;

  let html=`<div class="dd-top">
    <div class="dd-prog-bar"><div class="dd-prog-fill" style="width:${pct}%"></div></div>
    <div class="dd-prog-label">${done} of ${total} sets — ${pct}%</div>
    <div class="warmup-bar">🔥 Warmup: 5-min mobility circuit + 3-min bike</div>
  </div>`;

  cfg.ssOrder.forEach((origIdx,dispIdx)=>{
    const ss=day.ss[origIdx];
    const ssDone=ss.ex.reduce((a,_,ei)=>{
      let c=0; const n=getSetCount(sess,origIdx,ei);
      for(let i=0;i<n;i++) if(getSetData(sess,origIdx,ei,i).done) c++;
      return a+c;
    },0);
    const ssTotal=ss.ex.reduce((a,_,ei)=>a+getSetCount(sess,origIdx,ei),0);

    html+=`<div class="ss-block">
      <div class="ss-hdr">
        <span class="ss-label">${ss.lbl}</span>
        <span class="ss-reps">${ss.reps}</span>
        <span class="ss-done-count" style="opacity:${ssDone>0?1:0}">${ssDone}/${ssTotal}</span>
        <div class="reorder-btns ${reorderMode?"show":""}">
          <button class="ro-btn" ${dispIdx===0?"disabled":""} onclick="moveSS(${dispIdx},-1)">↑</button>
          <button class="ro-btn" ${dispIdx===cfg.ssOrder.length-1?"disabled":""} onclick="moveSS(${dispIdx},1)">↓</button>
        </div>
      </div>`;

    ss.ex.forEach((ex,exIdx)=>{
      const setCount=getSetCount(sess,origIdx,exIdx);
      const exDone=Array.from({length:setCount},(_,i)=>getSetData(sess,origIdx,exIdx,i).done).filter(Boolean).length;
      const isOpen=sess._open&&sess._open[`${origIdx}-${exIdx}`];
      const summaryColor=exDone===setCount&&exDone>0?"var(--green)":"var(--text2)";

      html+=`<div class="ex-item">
        <div class="ex-row-hdr" onclick="toggleEx(${origIdx},${exIdx})">
          <span class="ex-tag ${ex.t}">${ex.t}</span>
          <span class="ex-name">${ex.n}</span>
          <span class="ex-summary" style="color:${summaryColor}">${exDone===setCount&&exDone>0?"✓ "+setCount+" sets":exDone>0?exDone+"/"+setCount:setCount+" sets"}</span>
          <span class="ex-chevron ${isOpen?"open":""}">›</span>
        </div>
        <div class="ex-sets ${isOpen?"open":""}">`;

      for(let si=0;si<setCount;si++){
        const sd=getSetData(sess,origIdx,exIdx,si);
        html+=`<div class="set-row">
          <span class="set-num">Set ${si+1}</span>
          <input class="set-input set-weight" type="number" inputmode="decimal" min="0" step="0.5"
            placeholder="kg" value="${sd.weight}"
            onchange="setWeight(${origIdx},${exIdx},${si},this.value)">
          <span class="set-unit">kg</span>
          <span class="set-x">×</span>
          <input class="set-input set-reps" type="number" inputmode="numeric" min="1"
            placeholder="reps" value="${sd.reps}"
            onchange="setReps(${origIdx},${exIdx},${si},this.value)">
          <div class="set-dot ${sd.done?"done":""}" onclick="toggleSet(${origIdx},${exIdx},${si})"></div>
        </div>`;
      }

      html+=`<div class="set-actions">
          <button class="set-adj" onclick="adjustSets(${origIdx},${exIdx},-1)">− Set</button>
          <button class="set-rest" onclick="goTimer()">⏱ Rest 2 min</button>
          <button class="set-adj" onclick="adjustSets(${origIdx},${exIdx},1)">+ Set</button>
        </div>
        </div></div>`;
    });
    html+=`</div>`;
  });

  document.getElementById("day-detail").innerHTML=html;
}

function toggleEx(ssIdx,exIdx){
  const sess=getSession(currentDayId,today());
  if(!sess._open) sess._open={};
  const k=`${ssIdx}-${exIdx}`; sess._open[k]=!sess._open[k]; save(); renderDay();
}
function toggleSet(ssIdx,exIdx,setIdx){
  const sess=getSession(currentDayId,today());
  const sd=getSetData(sess,ssIdx,exIdx,setIdx); sd.done=!sd.done; save();
  if(navigator.vibrate) navigator.vibrate(25);
  renderDay();
}
function setWeight(ssIdx,exIdx,setIdx,val){ const sess=getSession(currentDayId,today()); getSetData(sess,ssIdx,exIdx,setIdx).weight=val; save(); }
function setReps(ssIdx,exIdx,setIdx,val){  const sess=getSession(currentDayId,today()); getSetData(sess,ssIdx,exIdx,setIdx).reps=val;   save(); }
function adjustSets(ssIdx,exIdx,delta){
  const sess=getSession(currentDayId,today());
  const k=`${ssIdx}-${exIdx}`;
  sess.setCount[k]=Math.max(1,Math.min(8,(sess.setCount[k]||PLAN.find(d=>d.id===currentDayId).ss[ssIdx].defSets)+delta));
  save(); renderDay();
}
function moveSS(dispIdx,dir){
  const cfg=getDayConfig(currentDayId);
  const ni=dispIdx+dir;
  if(ni<0||ni>=cfg.ssOrder.length) return;
  [cfg.ssOrder[dispIdx],cfg.ssOrder[ni]]=[cfg.ssOrder[ni],cfg.ssOrder[dispIdx]];
  save(); renderDay();
}

/* ═══════════════ CALENDAR ═══════════════ */
function renderCalendar(){
  const y=calViewDate.getFullYear(), m=calViewDate.getMonth();
  document.getElementById("cal-month-label").textContent=calViewDate.toLocaleDateString("en-US",{month:"long",year:"numeric"});
  const firstDay=new Date(y,m,1).getDay();
  const daysInMonth=new Date(y,m+1,0).getDate();
  const todayStr=today();

  let html=["Su","Mo","Tu","We","Th","Fr","Sa"].map(d=>`<div class="cal-dow">${d}</div>`).join("");
  for(let i=0;i<firstDay;i++) html+=`<div class="cal-day empty"></div>`;

  for(let d=1;d<=daysInMonth;d++){
    const ds=`${y}-${String(m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
    const sess=Object.values(S.sessions).filter(s=>s.date===ds);
    const hasW=sess.length>0;
    const wType=hasW?(PLAN.find(p=>p.id===sess[0].dayId)||{}).type||"":"";
    const isTod=ds===todayStr, isSel=ds===calSelectedDate;
    html+=`<div class="cal-day ${hasW?"has-workout":""} ${wType} ${isTod?"today":""} ${isSel?"selected":""}"
      onclick="selectCalDate('${ds}')">
      <span class="cal-dn" style="font-size:13px">${d}</span>
      ${hasW?`<div class="cal-dot"></div>`:""}
    </div>`;
  }
  document.getElementById("cal-grid").innerHTML=html;
  renderCalLog(calSelectedDate);
}

function selectCalDate(ds){ calSelectedDate=ds; renderCalendar(); }

function renderCalLog(ds){
  const titleEl=document.getElementById("cal-log-title");
  const logEl=document.getElementById("cal-log");
  if(!ds){ titleEl.textContent=""; logEl.innerHTML=""; return; }
  const d=new Date(ds+"T00:00:00");
  titleEl.textContent=d.toLocaleDateString("en-US",{weekday:"long",month:"short",day:"numeric",year:"numeric"});
  const sessions=Object.values(S.sessions).filter(s=>s.date===ds);
  if(!sessions.length){ logEl.innerHTML=`<div class="cal-empty">No workout logged on this day.</div>`; return; }
  let html="";
  sessions.forEach(sess=>{
    const day=PLAN.find(p=>p.id===sess.dayId); if(!day) return;
    const cfg=getDayConfig(sess.dayId);
    const {done,total}=countDone(sess,day);
    html+=`<div class="cal-entry">
      <div class="cal-entry-hdr">
        <span class="cal-entry-day">${day.short}</span>
        <span style="font-size:12px;color:${done===total?"var(--green)":"var(--amber)"}">${done}/${total} sets</span>
      </div>`;
    cfg.ssOrder.forEach(oi=>{
      const ss=day.ss[oi];
      html+=`<div class="cal-entry-ss"><div class="cal-entry-ss-name">${ss.lbl}</div>`;
      ss.ex.forEach((ex,ei)=>{
        const n=getSetCount(sess,oi,ei);
        const doneData=[]; for(let i=0;i<n;i++){const sd=getSetData(sess,oi,ei,i);if(sd.done)doneData.push(sd);}
        if(!doneData.length) return;
        const summary=doneData.map(s=>s.weight&&s.reps?`${s.weight}kg×${s.reps}`:s.weight?`${s.weight}kg`:s.reps?`×${s.reps}`:"✓").join("  ");
        html+=`<div class="cal-entry-ex">
          <span class="ex-tag ${ex.t}" style="font-size:9px;padding:1px 5px">${ex.t}</span>
          <span style="flex:1;font-size:12px">${ex.n}</span>
          <span class="cal-sets-inline">${summary}</span>
        </div>`;
      });
      html+=`</div>`;
    });
    html+=`</div>`;
  });
  logEl.innerHTML=html;
}

/* ═══════════════ PROGRESS ═══════════════ */
function renderProgress(){
  const t=today();
  let totalSessions=Object.keys(S.sessions).length, totalWeight=0;
  Object.values(S.sessions).forEach(sess=>Object.values(sess.sets).forEach(sd=>{
    if(sd.done&&sd.weight) totalWeight+=parseFloat(sd.weight)||0;
  }));
  let totalDone=0,totalAll=0;

  let html=`<div class="stat-grid">
    <div class="stat-cell"><div class="stat-val">${totalSessions}</div><div class="stat-lbl">Sessions logged</div></div>
    <div class="stat-cell"><div class="stat-val">${totalWeight>999?Math.round(totalWeight/100)/10+"t":Math.round(totalWeight)+"kg"}</div><div class="stat-lbl">Total weight lifted</div></div>
  </div>
  <div class="prog-card"><div class="prog-card-title">Today's progress</div>`;

  PLAN.forEach(d=>{
    const sess=getSession(d.id,t);
    const {done,total}=countDone(sess,d);
    totalDone+=done; totalAll+=total;
    const pct=total>0?Math.round(done/total*100):0;
    html+=`<div class="prog-row">
      <div class="prog-row-top"><span class="prog-row-name">${d.short}</span><span class="prog-row-val">${done}/${total}</span></div>
      <div class="prog-bar2"><div class="prog-fill2" style="width:${pct}%;background:${pct===100?"var(--green)":d.type==="upper"?"var(--blue)":"var(--amber)"}"></div></div>
    </div>`;
  });

  const wp=totalAll>0?Math.round(totalDone/totalAll*100):0;
  html+=`</div>
  <div class="prog-card" style="text-align:center">
    <div class="prog-card-title">Overall today</div>
    <div style="font-size:52px;font-weight:300;padding:8px 0">${wp}%</div>
    <div style="font-size:12px;color:var(--text2)">${totalDone} of ${totalAll} sets across all workouts</div>
  </div>
  <button onclick="if(confirm('Reset ALL progress and history?')){S={config:{},sessions:{}};save();renderProgress();renderHome();}"
    style="width:100%;padding:13px;background:var(--bg2);border:1px solid var(--border);color:var(--text3);border-radius:var(--r);font-size:13px;cursor:pointer">
    Reset all data
  </button>`;

  document.getElementById("progress-screen").innerHTML=html;
}

/* ═══════════════ BUTTON WIRING ═══════════════ */
document.getElementById("back-btn").addEventListener("click",()=>{
  clearInterval(timerInterval);
  if(currentScreen==="timer") openDay(currentDayId);
  else goHome();
});
document.getElementById("reorder-btn").addEventListener("click",()=>{
  reorderMode=!reorderMode;
  const btn=document.getElementById("reorder-btn");
  btn.textContent=reorderMode?"Done":"Reorder";
  btn.classList.toggle("active",reorderMode);
  renderDay();
});
document.getElementById("theme-btn").addEventListener("click", toggleTheme);
document.getElementById("t-skip").addEventListener("click",()=>{ clearInterval(timerInterval); openDay(currentDayId); });
document.getElementById("cal-prev").addEventListener("click",()=>{ calViewDate.setMonth(calViewDate.getMonth()-1); renderCalendar(); });
document.getElementById("cal-next").addEventListener("click",()=>{ calViewDate.setMonth(calViewDate.getMonth()+1); renderCalendar(); });

/* Service worker */
if("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js").catch(()=>{});

goHome();
</script>
</body>
</html>
